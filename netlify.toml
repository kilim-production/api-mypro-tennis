[build]
  command = "npm run build -w @mypro/shared && npm run build -w @mypro/tennis-web"
  publish = "apps/mypro-tennis-web/dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://mypro-tennis-api.onrender.com/api"
  VITE_SOCKET_URL = "https://mypro-tennis-api.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/visuals/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/profile-pictures/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"
